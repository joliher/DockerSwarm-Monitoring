# Config Prometheus - Metrics collection and storage configuration
global:
  scrape_interval: 15s
  scrape_timeout: 15s

scrape_configs:
  - job_name: node
    static_configs:
      - targets:
          - '${SWARM_MANAGER_IP}:${PORT_NODE_EXPORTER}'
          - '${SWARM_WORKER1_IP}:${PORT_NODE_EXPORTER}'
          - '${SWARM_WORKER2_IP}:${PORT_NODE_EXPORTER}'